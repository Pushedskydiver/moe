name: CI

# The "Quality suite" job mirrors CLAUDE.md's documented pre-push suite exactly
# (same commands, same order) so a green run here reproduces locally with no
# hidden extra steps. "AGENTS.md freshness" is a separate, additional gate
# (docs/DEVELOPMENT.md §AGENTS.md generation) — not part of that mirrored
# suite, since a developer only needs to run its underlying commands after
# editing CLAUDE.md, not on every push.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality suite
    runs-on: ubuntu-latest
    # packages/core's ticket-lifecycle tests need a real Postgres (docs/TESTING.md: prefer a
    # real test database) — a vanilla postgres:17 service is a faithful stand-in for Neon
    # (which runs unmodified Postgres under the hood), no external API/secret needed.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: moe_ci_password
          POSTGRES_DB: moe_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:moe_ci_password@localhost:5432/moe_ci
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - run: pnpm build
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm format:check
      - run: pnpm knip

  agents-md-freshness:
    name: AGENTS.md freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - run: pnpm generate:agents-md
      - run: pnpm format
      - run: git diff --exit-code AGENTS.md
