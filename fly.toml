# One machine per persona (docs/ARCHITECTURE.md "Process topology") — this file is the shared
# template; each persona's own deploy sets `app` and the MOE_PERSONA_ID / Slack env vars
# separately (`fly secrets set`, per persona). `fly deploy` is Alex-only (CLAUDE.md) — never
# CI-automated.
app = "moe"
primary_region = "iad"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
